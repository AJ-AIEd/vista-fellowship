<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page Not Found — CNG AI Innovation Fellowship</title>
<link rel="stylesheet" href="/css/shared.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
.wrapper{min-height:100vh;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
.code{font-family:'DM Mono',monospace;font-size:72px;font-weight:500;color:var(--gold);line-height:1;margin-bottom:16px}
h1{font-family:'Fraunces',serif;font-size:clamp(24px,4vw,36px);font-weight:700;color:#fff;margin-bottom:12px}
p{font-size:15px;color:var(--mid);max-width:400px;line-height:1.6;margin-bottom:32px}
.links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
a.btn{padding:11px 24px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border-radius:5px;text-decoration:none;transition:opacity .2s}
a.btn-p{background:var(--gold);color:var(--navy)}
a.btn-s{border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7)}
a.btn:hover{opacity:.8}
</style>
</head>
<body>
<div class="wrapper">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>This page doesn't exist. You might be looking for the Fellowship Hub or the VISTA Protocol tool.</p>
  <div class="links">
    <a href="/" class="btn btn-p">← Fellowship Hub</a>
    <a href="/vista" class="btn btn-s">VISTA Protocol Tool</a>
  </div>
</div>
</body>
</html>
